# Self-hosted / production stack
# Copy .env.example to .env, fill in POSTGRES_PASSWORD and DATABASE_URL, then:
#   docker compose up -d --build
#
# App is served on http://localhost (port 80).
# All data is stored in named Docker volumes (postgres_data, storage).

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_PATH: /storage
    volumes:
      - storage:/storage
      # Alembic migrations are mounted so the container can run upgrades
      # using the current migration files from the repo.
      - ./backend/alembic:/app/alembic:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  camoufox-browser:
    build:
      context: ./camoufox-browser
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3392/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_hoarder}
      POSTGRES_USER: ${POSTGRES_USER:-khoarder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-khoarder}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  storage:
